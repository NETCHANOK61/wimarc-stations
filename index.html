<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Wimarc Site - Full Reset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f1f5f9;
            overflow: hidden;
        }

        #map-canvas {
            flex: 1;
            width: 100%;
        }

        #bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.15);
            transition: height 0.3s ease;
            display: flex;
            flex-direction: column;
            border-radius: 20px 20px 0 0;
            height: 50px;
        }

        #bottom-sheet.expanded {
            height: 260px;
        }

        .drag-handle {
            width: 100%;
            height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: #f8fafc;
            border-radius: 20px 20px 0 0;
        }

        .handle-bar {
            width: 40px;
            height: 4px;
            background: #cbd5e1;
            border-radius: 2px;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            height: calc(100% - 25px);
            padding: 0 15px 10px 15px;
            overflow: hidden;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #searchInput,
        #dateFilter {
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }

        .filter-group {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .filter-btn {
            white-space: nowrap;
            padding: 5px 12px;
            font-size: 11px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 500;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #2563eb;
        }

        #station-list {
            flex: 1;
            display: flex;
            flex-direction: row;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 2px;
            scroll-snap-type: x mandatory;
        }

        .station-card {
            min-width: 240px;
            max-width: 240px;
            height: 85px;
            background: #fff;
            border-radius: 10px;
            padding: 12px;
            border-left: 5px solid #ef4444;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            flex-shrink: 0;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .station-card.done {
            border-left-color: #10b981;
        }

        .station-card.comittee-check {
            background: #fffbeb;
            border-right: 5px solid #f59e0b;
        }

        .badge {
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .badge-pending {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-done {
            background: #d1fae5;
            color: #064e3b;
        }

        #station-list::-webkit-scrollbar {
            height: 4px;
        }

        #station-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div id="bottom-sheet">
        <div class="drag-handle" onclick="toggleSheet()">
            <div class="handle-bar"></div>
        </div>
        <div class="content-container">
            <div class="header-flex">
                <h4 style="margin:0;">จุดติดตั้ง (<span id="stat-count">0</span>)</h4>
                <span onclick="toggleSheet()"
                    style="color:#3b82f6; font-size:12px; font-weight:bold; cursor:pointer;">ย่อ/ขยาย</span>
            </div>
            <div class="controls">
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่อ/เจ้าของ...">
                    <select id="dateFilter" onchange="applyFilters()">
                        <option value="all">ทุกวันที่</option>
                    </select>
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterType('all', this)">ทั้งหมด (Reset)</button>
                    <button class="filter-btn" onclick="filterType('pending', this)">รอติดตั้ง</button>
                    <button class="filter-btn" onclick="filterType('done', this)">ติดตั้งเสร็จ</button>
                    <button class="filter-btn" onclick="filterType('comittee', this)">กรรมการลงพื้นที่ด้วย</button>
                </div>
            </div>
            <div id="station-list"></div>
        </div>
    </div>

        function initMap() {
            maps = new google.maps.Map(document.getElementById("map-canvas"), {
                center: {
                    lat: 12.7322,
                    lng: 101.8517
                },
                zoom: 10,
                mapTypeControl: false,
                streetViewControl: false
            });
            populateDateFilter();
            renderAll(myData);
        }

        function toggleSheet() {
            $('#bottom-sheet').toggleClass('expanded');
        }

        function populateDateFilter() {
            let dates = [...new Set(myData.map(item => item.appointment.split(' ')[0]))];
            dates.sort();
            dates.forEach(d => {
                $('#dateFilter').append(`<option value="${d}">${d}</option>`);
            });
        }

        function renderAll(data) {
            $('#station-list').empty();
            $.each(data, function (i, item) {
                var coords = item.location.split(",");
                var lat = parseFloat(coords[0]),
                    lng = parseFloat(coords[1]);
                var iconFile = item.customer_check ? "client.png" : (item.status ? "check.png" : "main.png");
                var marker = new google.maps.Marker({
                    position: {
                        lat: lat,
                        lng: lng
                    },
                    map: maps,
                    icon: {
                        url: iconFile
                    }
                });
                markers.push({
                    ...item,
                    marker: marker,
                    date: item.appointment.split(' ')[0]
                });

                var card = $(`
                    <div class="station-card ${item.status ? 'done' : ''} ${item.customer_check ? 'comittee-check' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items: baseline;">
                            <span style="font-weight:bold; font-size:14px;">${item.name}</span>
                            <span class="badge ${item.status ? 'badge-done' : 'badge-pending'}">${item.status ? 'เสร็จ' : 'รอ'}</span>
                        </div>
                        <div style="font-size:11px; color:#64748b;">👤 ${item.owner}</div>
                        <div style="font-size:10px; color:#3b82f6; font-weight:500;">📅 ${item.appointment}</div>
                    </div>
                `);
                card.click(function () {
                    maps.setZoom(16);
                    maps.panTo(marker.getPosition());
                });
                $('#station-list').append(card);
            });
            $('#stat-count').text(myData.length);
        }

        function filterType(type, btn) {
            $('.filter-btn').removeClass('active');
            $(btn).addClass('active');
            currentType = type;
            if (type === 'all') {
                $('#searchInput').val('');
                $('#dateFilter').val('all');
            }
            applyFilters();
        }

        function applyFilters() {
            var searchQuery = $('#searchInput').val().toLowerCase();
            var dateQuery = $('#dateFilter').val();
            var visibleCount = 0;
            var bounds = new google.maps.LatLngBounds();

            $.each(markers, function (i, obj) {
                var matchSearch = obj.name.toLowerCase().includes(searchQuery) || obj.owner.includes(
                    searchQuery);
                var matchDate = (dateQuery === 'all' || obj.date === dateQuery);
                var matchType = (currentType === 'all') || (currentType === 'done' && obj.status) || (
                    currentType === 'pending' && !obj.status) || (currentType === 'comittee' && obj
                    .customer_check);
                var isVisible = matchSearch && matchDate && matchType;
                obj.marker.setMap(isVisible ? maps : null);
                $(`#station-list .station-card`).eq(i).toggle(isVisible);
                if (isVisible) {
                    visibleCount++;
                    bounds.extend(obj.marker.getPosition());
                }
            });
            $('#stat-count').text(visibleCount);
            if (visibleCount > 0 && currentType === 'all' && searchQuery === '' && dateQuery === 'all') maps.fitBounds(
                bounds);
        }

        $('#searchInput').on('keyup', applyFilters);
